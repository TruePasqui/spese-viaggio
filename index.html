<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spese viaggio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.app{max-width:560px;margin:0 auto;padding:1rem}
.card{background:#fff;border:1px solid #e5e5e0;border-radius:12px;padding:1.25rem;margin-bottom:1rem}
.section-title{font-size:11px;font-weight:500;color:#888;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.75rem}
.members-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;min-height:10px}
.chip{display:flex;align-items:center;gap:6px;background:#f5f5f0;border:1px solid #e5e5e0;border-radius:20px;padding:4px 10px 4px 6px;font-size:13px}
.del{background:none;border:none;cursor:pointer;color:#aaa;font-size:15px;padding:0;line-height:1;font-family:inherit}
.del:hover{color:#555}
.row{display:flex;gap:8px;align-items:center}
input,select{padding:8px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;font-family:inherit;outline:none;transition:border .15s}
input:focus,select:focus{border-color:#888}
.btn{padding:8px 14px;border:1px solid #ddd;border-radius:8px;background:#f5f5f0;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:inherit;white-space:nowrap;transition:background .15s}
.btn:hover{background:#eae9e4}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{background:#333}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.label{font-size:12px;color:#888;margin-bottom:4px}
.expense-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f9f9f7;border-radius:8px;margin-bottom:6px;font-size:14px}
.tabs{display:flex;border:1px solid #e5e5e0;border-radius:8px;overflow:hidden;margin-bottom:1rem}
.tab{flex:1;padding:9px;border:none;cursor:pointer;font-size:14px;font-family:inherit;background:#fff;color:#888;transition:all .15s}
.tab.active{background:#1a1a1a;color:#fff;font-weight:500}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem}
.metric{background:#f5f5f0;border-radius:8px;padding:.75rem 1rem}
.metric-label{font-size:11px;color:#888;margin-bottom:4px}
.metric-value{font-size:19px;font-weight:500}
.balance-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid #e5e5e0;border-radius:8px;margin-bottom:6px;font-size:14px}
.settle-item{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f9f9f7;border-radius:8px;margin-bottom:6px;font-size:14px}
.pos{color:#0F6E56;font-weight:500}.neg{color:#A32D2D;font-weight:500}.zero{color:#888}
.ml-auto{margin-left:auto}
.muted{font-size:12px;color:#999}
.empty{font-size:13px;color:#aaa;text-align:center;padding:1rem 0}
.status-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;font-size:12px;color:#aaa}
.fullw{width:100%}
.sep{border-top:1px solid #e5e5e0;margin-top:1.25rem;padding-top:1.25rem}
.sync-row{display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-green{background:#0F6E56}.dot-amber{background:#f0a500}.dot-red{background:#A32D2D}.dot-gray{background:#ccc}
</style>
</head>
<body>
<div class="app">
  <div class="status-bar">
    <div class="sync-row">
      <div class="dot dot-gray" id="sync-dot"></div>
      <span id="sync-label">Avvio...</span>
    </div>
    <span id="last-sync"></span>
  </div>

  <div class="card">
    <div class="section-title">Partecipanti</div>
    <div class="members-grid" id="members-grid"></div>
    <div class="row">
      <input id="new-member" placeholder="Nome partecipante" maxlength="20" style="flex:1" />
      <button class="btn" onclick="addMember()">+ Aggiungi</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('spese',this)">Spese</button>
    <button class="tab" onclick="switchTab('riepilogo',this)">Riepilogo</button>
  </div>

  <div id="tab-spese">
    <div class="card">
      <div class="section-title">Aggiungi spesa</div>
      <div class="grid2">
        <div><div class="label">Descrizione</div><input id="exp-desc" placeholder="es. Cena, Hotel..." class="fullw" /></div>
        <div><div class="label">Importo (&euro;)</div><input id="exp-amount" type="number" placeholder="0.00" min="0" step="0.01" class="fullw" /></div>
      </div>
      <div class="grid2" style="margin-bottom:8px">
        <div><div class="label">Pagato da</div><select id="exp-payer" class="fullw"></select></div>
        <div><div class="label">Data</div><input id="exp-date" type="date" class="fullw" /></div>
      </div>
      <button class="btn btn-primary fullw" onclick="addExpense()">+ Aggiungi spesa</button>
      <div class="sep">
        <div class="section-title" id="exp-count-label">Tutte le spese</div>
        <div id="expense-list"></div>
      </div>
    </div>
  </div>

  <div id="tab-riepilogo" style="display:none">
    <div id="summary-content"></div>
  </div>
</div>

<script>
const BIN_ID = "69c250b2b7ec241ddc99e769";
const API_KEY = "$2a$10$iAiyzD0l0OtxpI3/2MSQl..6LBJcGxzZlXRqWKt6t.bHEthLzYOCq";
const BASE = "https://api.jsonbin.io/v3/b/" + BIN_ID;
const LS_KEY = "spese_viaggio_v1";

const AVATARS = [
  {bg:"#EEEDFE",c:"#3C3489"},{bg:"#E1F5EE",c:"#085041"},
  {bg:"#FAECE7",c:"#712B13"},{bg:"#E6F1FB",c:"#0C447C"},
  {bg:"#FAEEDA",c:"#633806"},{bg:"#FBEAF0",c:"#72243E"}
];

let state = {members:[], expenses:[]};
let syncing = false;
let currentTab = "spese";
let online = navigator.onLine;

function loadLocal() {
  try { const r = localStorage.getItem(LS_KEY); if(r) state = JSON.parse(r); } catch(e){}
}

function saveLocal() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e){}
}

function mergeStates(local, remote) {
  const allMembers = [...new Set([...local.members, ...remote.members])];
  const localIds = new Set(local.expenses.map(e=>e.id));
  const allExpenses = [
    ...local.expenses,
    ...remote.expenses.filter(e=>!localIds.has(e.id))
  ].sort((a,b)=>a.id-b.id);
  return {members:allMembers, expenses:allExpenses};
}

async function syncWithServer() {
  if (syncing || !online) return;
  syncing = true;
  setStatus("syncing");
  try {
    const r = await fetch(BASE+"/latest", {
      headers:{"X-Master-Key":API_KEY},
      signal:AbortSignal.timeout(8000)
    });
    if(!r.ok) throw new Error();
    const d = await r.json();
    const remote = d.record || {members:[],expenses:[]};
    const merged = mergeStates(state, remote);
    const changed = JSON.stringify(merged) !== JSON.stringify(remote);
    state = merged;
    saveLocal();
    if(changed) {
      await fetch(BASE, {
        method:"PUT",
        headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
        body:JSON.stringify(state),
        signal:AbortSignal.timeout(8000)
      });
    }
    const now = new Date();
    document.getElementById("last-sync").textContent =
      "Sincron. " + now.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"});
    setStatus("online");
    render();
  } catch(e) {
    setStatus(online?"error":"offline");
  }
  syncing = false;
}

function setStatus(s) {
  const dot = document.getElementById("sync-dot");
  const label = document.getElementById("sync-label");
  dot.className = "dot";
  if(s==="online"){dot.classList.add("dot-green");label.textContent="Connesso";}
  else if(s==="offline"){dot.classList.add("dot-amber");label.textContent="Offline \u2014 spese salvate localmente";}
  else if(s==="syncing"){dot.classList.add("dot-gray");label.textContent="Sincronizzazione...";}
  else if(s==="error"){dot.classList.add("dot-red");label.textContent="Errore di rete, riprovo...";}
}

window.addEventListener("online", ()=>{online=true;syncWithServer();});
window.addEventListener("offline", ()=>{online=false;setStatus("offline");});

function av(name,idx,size=24){
  const a=AVATARS[idx%6];
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${a.bg};color:${a.c};display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.38)}px;font-weight:500;flex-shrink:0">${name.slice(0,2).toUpperCase()}</div>`;
}
function fmt(n){return "\u20ac"+parseFloat(n).toFixed(2);}
function fmtDate(d){
  if(!d) return "";
  const [y,m,day]=d.split("-");
  return `${day}/${m}`;
}
function setTodayDate(){
  const inp=document.getElementById("exp-date");
  if(inp&&!inp.value){
    const now=new Date();
    inp.value=now.toISOString().split("T")[0];
  }
}

function render(){
  renderMembers();renderPayer();renderExpenses();
  if(currentTab==="riepilogo") renderSummary();
}

function renderMembers(){
  const grid=document.getElementById("members-grid");
  if(!state.members.length){grid.innerHTML='<span style="font-size:13px;color:#aaa">Nessun partecipante</span>';return;}
  grid.innerHTML=state.members.map((m,i)=>
    `<div class="chip">${av(m,i,22)}<span>${m}</span><button class="del" onclick="removeMember('${m}')">X</button></div>`
  ).join("");
}

function renderPayer(){
  const sel=document.getElementById("exp-payer");
  const cur=sel.value;
  sel.innerHTML=state.members.length
    ?state.members.map(m=>`<option value="${m}">${m}</option>`).join("")
    :'<option value="">— aggiungi partecipanti prima —</option>';
  if(cur&&state.members.includes(cur)) sel.value=cur;
}

function renderExpenses(){
  const list=document.getElementById("expense-list");
  document.getElementById("exp-count-label").textContent=`Tutte le spese (${state.expenses.length})`;
  if(!state.expenses.length){list.innerHTML='<div class="empty">Nessuna spesa ancora</div>';return;}
  list.innerHTML=[...state.expenses].reverse().map(e=>{
    const idx=state.members.indexOf(e.payer);
    return `<div class="expense-item">
      <div style="display:flex;align-items:center;gap:8px">
        ${av(e.payer,idx>=0?idx:0,26)}
        <div><div style="font-weight:500">${e.desc}</div><div class="muted">${e.date?fmtDate(e.date)+' · ':''}pagato da ${e.payer}</div></div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-weight:500;font-size:15px">${fmt(e.amount)}</span>
        <button class="del" onclick="removeExpense(${e.id})">X</button>
      </div>
    </div>`;
  }).join("");
}

function renderSummary(){
  const el=document.getElementById("summary-content");
  if(!state.members.length||!state.expenses.length){
    el.innerHTML='<div class="card empty" style="padding:2rem">Aggiungi partecipanti e spese per vedere il riepilogo</div>';return;
  }
  const total=state.expenses.reduce((s,e)=>s+e.amount,0);
  const share=total/state.members.length;
  const paid={};
  state.members.forEach(m=>paid[m]=0);
  state.expenses.forEach(e=>{if(paid[e.payer]!==undefined)paid[e.payer]+=e.amount;});
  const balances=state.members.map(m=>({name:m,paid:paid[m],balance:paid[m]-share}));
  const debtors=balances.map(b=>({...b})).filter(b=>b.balance<-0.005).sort((a,b)=>a.balance-b.balance);
  const creditors=balances.map(b=>({...b})).filter(b=>b.balance>0.005).sort((a,b)=>b.balance-a.balance);
  const txs=[];let i=0,j=0;
  while(i<debtors.length&&j<creditors.length){
    const d=debtors[i],c=creditors[j];
    const amt=Math.min(-d.balance,c.balance);
    if(amt>0.005)txs.push({from:d.name,to:c.name,amount:amt});
    d.balance+=amt;c.balance-=amt;
    if(Math.abs(d.balance)<0.005)i++;
    if(Math.abs(c.balance)<0.005)j++;
  }
  el.innerHTML=`
    <div class="metric-grid">
      <div class="metric"><div class="metric-label">Totale spese</div><div class="metric-value">${fmt(total)}</div></div>
      <div class="metric"><div class="metric-label">Quota persona</div><div class="metric-value">${fmt(share)}</div></div>
      <div class="metric"><div class="metric-label">N. spese</div><div class="metric-value">${state.expenses.length}</div></div>
    </div>
    <div class="card">
      <div class="section-title">Bilancio per persona</div>
      ${balances.map((b,i)=>{
        const pos=b.balance>0.005,neg=b.balance<-0.005;
        return `<div class="balance-item">
          <div style="display:flex;align-items:center;gap:8px">
            ${av(b.name,i,28)}
            <div><div>${b.name}</div><div class="muted">ha pagato ${fmt(b.paid)}</div></div>
          </div>
          <div class="${pos?'pos':neg?'neg':'zero'}">${pos?'+':''}${fmt(b.balance)}</div>
        </div>`;
      }).join("")}
    </div>
    <div class="card">
      <div class="section-title">Come saldare</div>
      ${txs.length===0
        ?'<div class="empty">Tutto in pari, nessun pagamento necessario</div>'
        :txs.map(t=>{
          const fi=state.members.indexOf(t.from),ti=state.members.indexOf(t.to);
          return `<div class="settle-item">
            ${av(t.from,fi>=0?fi:0,26)}
            <span style="font-weight:500">${t.from}</span>
            <span class="muted">&#8594; paga</span>
            ${av(t.to,ti>=0?ti:0,26)}
            <span style="font-weight:500">${t.to}</span>
            <span class="ml-auto" style="font-weight:500">${fmt(t.amount)}</span>
          </div>`;
        }).join("")}
    </div>`;
}

function switchTab(tab,btn){
  currentTab=tab;
  document.getElementById("tab-spese").style.display=tab==="spese"?"block":"none";
  document.getElementById("tab-riepilogo").style.display=tab==="riepilogo"?"block":"none";
  document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  if(tab==="riepilogo") renderSummary();
}

async function addMember(){
  const inp=document.getElementById("new-member");
  const name=inp.value.trim();
  if(!name||state.members.includes(name))return;
  state.members.push(name);inp.value="";
  saveLocal();render();syncWithServer();
}

async function removeMember(m){
  state.members=state.members.filter(x=>x!==m);
  state.expenses=state.expenses.filter(e=>e.payer!==m);
  saveLocal();render();syncWithServer();
}

async function addExpense(){
  const desc=document.getElementById("exp-desc").value.trim();
  const amt=parseFloat(document.getElementById("exp-amount").value);
  const payer=document.getElementById("exp-payer").value;
  const date=document.getElementById("exp-date").value;
  if(!desc||isNaN(amt)||amt<=0||!payer)return;
  state.expenses.push({id:Date.now(),desc,amount:amt,payer,date});
  document.getElementById("exp-desc").value="";
  document.getElementById("exp-amount").value="";
  setTodayDate();
  saveLocal();render();syncWithServer();
}

async function removeExpense(id){
  state.expenses=state.expenses.filter(e=>e.id!==id);
  saveLocal();render();syncWithServer();
}

document.getElementById("new-member").addEventListener("keydown",e=>{if(e.key==="Enter")addMember();});
document.getElementById("exp-desc").addEventListener("keydown",e=>{if(e.key==="Enter")addExpense();});

loadLocal();
render();
setTodayDate();
setStatus(online?"syncing":"offline");
if(online) syncWithServer();
setInterval(()=>{if(online)syncWithServer();},15000);
</script>
</body>
</html>
